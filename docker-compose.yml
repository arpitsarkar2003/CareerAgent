services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    environment:
      # Docker Desktop / macOS: bind mounts need polling for reliable HMR
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Live source — edit on host, Next sees it immediately
      - ./apps/web:/app
      # Keep container node_modules (don’t overwrite with host/empty folder)
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    depends_on:
      - api

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    # Reload on Python file changes
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  web_node_modules:
  web_next_cache:
